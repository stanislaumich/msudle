{% extends "base.html" %}
{% block title %}Удалить {{ type }} — Msudle{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-body text-center py-5">
            <i class="bi bi-exclamation-triangle text-warning" style="font-size: 4rem;"></i>
            <h3 class="mt-3">Удалить {{ type }}?</h3>
            <p class="fs-5 text-muted">
                Вы действительно хотите удалить {{ type }} <strong>{{ obj.full_name }}</strong>?
            </p>
            <p class="text-danger">Это действие необратимо.</p>
            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Удалить
                    </button>
                    <a href="{% url cancel_url %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
