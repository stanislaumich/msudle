{% extends "base.html" %}
{% block title %}Редактировать университет — Msudle{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">
        <i class="bi bi-pencil-square me-2"></i>Редактировать: {{ university.full_name }}
    </h2>

    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="fullName" class="form-label">Полное наименование *</label>
                        <input type="text" name="full_name" id="fullName" class="form-control" 
                               value="{{ form_data.full_name|default:university.full_name|default:'' }}" required>
                    </div>
                    <div class="col-md-3">
                        <label for="shortName" class="form-label">Краткое наименование</label>
                        <input type="text" name="short_name" id="shortName" class="form-control" 
                               value="{{ form_data.short_name|default:university.short_name|default:'' }}">
                    </div>
                    <div class="col-md-3">
                        <label for="identifier" class="form-label">Идентификатор</label>
                        <input type="text" name="identifier" id="identifier" class="form-control" 
                               value="{{ form_data.identifier|default:university.identifier|default:'' }}" 
                               placeholder="Например: msu">
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Сохранить
                    </button>
                    <a href="{% url 'structure:dashboard' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
