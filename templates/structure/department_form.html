{% extends "base.html" %}
{% block title %}{% if department %}Редактировать{% else %}Создать{% endif %} кафедру — Msudle{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">
        {% if department %}
        <i class="bi bi-pencil-square me-2"></i>Редактировать: {{ department.full_name }}
        {% else %}
        <i class="bi bi-plus-circle me-2"></i>Добавить кафедру
        {% endif %}
    </h2>

    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="fullName" class="form-label">Полное наименование *</label>
                        <input type="text" name="full_name" id="fullName" class="form-control" 
                               value="{{ form_data.full_name|default:department.full_name|default:'' }}" required>
                    </div>
                    <div class="col-md-3">
                        <label for="shortName" class="form-label">Краткое наименование</label>
                        <input type="text" name="short_name" id="shortName" class="form-control" 
                               value="{{ form_data.short_name|default:department.short_name|default:'' }}">
                    </div>
                    <div class="col-md-3">
                        <label for="identifier" class="form-label">Идентификатор</label>
                        <input type="text" name="identifier" id="identifier" class="form-control" 
                               value="{{ form_data.identifier|default:department.identifier|default:'' }}" 
                               placeholder="Например: РГФ">
                    </div>
                    <div class="col-md-6">
                        <label for="facultySelect" class="form-label">Факультет *</label>
                        <select name="faculty" id="facultySelect" class="form-select" required>
                            <option value="">— Выберите факультет —</option>
                            {% for f in faculties %}
                            {% with selected=form_data.faculty|default:department.faculty.id|default:''|stringformat:"s" %}
                            <option value="{{ f.id }}" {% if selected == f.id|stringformat:"s" %}selected{% endif %}>
                                {{ f.full_name }} ({{ f.university.full_name }})
                            </option>
                            {% endwith %}
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        {% if department %}<i class="bi bi-check-lg me-1"></i>Сохранить
                        {% else %}<i class="bi bi-plus-lg me-1"></i>Создать{% endif %}
                    </button>
                    <a href="{% url 'structure:dashboard' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
