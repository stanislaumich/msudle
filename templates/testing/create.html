{% extends "base.html" %}
{% block title %}{% if editing %}Редактирование теста{% else %}Создание теста{% endif %} — Msudle{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        {% if editing %}
                        <i class="bi bi-pencil me-2"></i>Редактирование теста
                        {% else %}
                        <i class="bi bi-plus-lg me-2"></i>Создание теста
                        {% endif %}
                    </h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="nameInput" class="form-label">Название теста <span class="text-danger">*</span></label>
                            <input type="text" name="name" id="nameInput" class="form-control" required
                                   value="{% if form_data.name %}{{ form_data.name }}{% elif test %}{{ test.name }}{% endif %}"
                                   placeholder="Введите название теста">
                        </div>
                        <div class="mb-3">
                            <label for="subjectSelect" class="form-label">Дисциплина <span class="text-danger">*</span></label>
                            <select name="subject" id="subjectSelect" class="form-select" required>
                                <option value="">Выберите дисциплину...</option>
                                {% for s in subjects %}
                                <option value="{{ s.id }}"
                                    {% if form_data.subject and form_data.subject|add:"0" == s.id %}selected
                                    {% elif test and test.subject_id == s.id %}selected
                                    {% endif %}>
                                    {{ s.full_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="descInput" class="form-label">Описание</label>
                            <textarea name="description" id="descInput" class="form-control" rows="4"
                                      placeholder="Краткое описание теста (необязательно)">{% if form_data.description %}{{ form_data.description }}{% elif test %}{{ test.description|default:'' }}{% endif %}</textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                {% if editing %}
                                <i class="bi bi-check-lg me-1"></i>Сохранить
                                {% else %}
                                <i class="bi bi-plus-lg me-1"></i>Создать тест
                                {% endif %}
                            </button>
                            <a href="{% url 'testing:list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
