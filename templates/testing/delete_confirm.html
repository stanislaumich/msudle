{% extends "base.html" %}
{% block title %}Удаление теста — Msudle{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-exclamation-triangle me-2"></i>Удаление теста
                    </h4>
                </div>
                <div class="card-body text-center">
                    <p class="fs-5 mb-2">Вы уверены, что хотите удалить тест?</p>
                    <p class="fw-bold">{{ test.name }}</p>
                    <p class="text-muted small">Дисциплина: {{ test.subject.full_name }}</p>
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-1"></i>Удалить
                            </button>
                            <a href="{% url 'testing:list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
