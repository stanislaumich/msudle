{% extends "base.html" %}
{% block title %}Удалить группу — Msudle{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Удаление группы</h5>
                </div>
                <div class="card-body text-center">
                    <p class="fs-5 mb-2">Удалить группу преподавателей?</p>
                    <p class="fw-bold">{{ group.name }}</p>
                    <p class="text-muted small">Участников: {{ group.users.count }}</p>
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-1"></i>Удалить
                            </button>
                            <a href="{% url 'accounts:teacher_groups' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
