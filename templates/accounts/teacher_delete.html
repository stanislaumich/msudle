{% extends "base.html" %}
{% block title %}Удалить преподавателя — Msudle{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Удаление преподавателя</h5>
                </div>
                <div class="card-body text-center">
                    <p class="fs-5 mb-2">Вы уверены, что хотите удалить преподавателя?</p>
                    <p class="fw-bold">{{ teacher.last_name }} {{ teacher.first_name }}</p>
                    <p class="text-muted small">Логин: {{ teacher.username }}</p>
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-1"></i>Удалить
                            </button>
                            <a href="{% url 'accounts:teacher_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
